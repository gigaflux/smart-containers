# ============================================================================
# NETWORK & CONNECTIONS
# ============================================================================

# Listen on all network interfaces inside the Docker network overlay
bind 0.0.0.0

# Standard Redis communication port
port 6379
# port 0
# tls-port 6379

# Close connection if a client is idle for N seconds (0 to disable timeout)
timeout 300

# Enable protected mode to enforce authentication checks
protected-mode yes

# ============================================================================
# MEMORY MANAGEMENT
# ============================================================================

# Memory limit for a single node (adjust based on your RAM size: e.g., 512mb, 1gb)
maxmemory 512mb

# Eviction policy used when maxmemory is reached.
# 'allkeys-lru' drops the least recently used keys first.
# This prevents Out-Of-Memory (OOM) crashes if the Celery task queue peaks.
maxmemory-policy allkeys-lru


# ============================================================================
# PERSISTENCE (DISABLED FOR CELERY SPEED)
# ============================================================================

# Disable automatic RDB disk snapshots by passing an empty string
save ""

# Disable AOF (Append Only File) logging
appendonly no

# Working directory where Redis dumps internal state metadata (like nodes.conf)
dir /data


# ============================================================================
# REDIS CLUSTER MODE
# ============================================================================

# Enable cluster architecture support
cluster-enabled no

# Filename where this node automatically maintains cluster state data
cluster-config-file nodes.conf

# Timeout (in milliseconds) before a node is marked as offline by peers
cluster-node-timeout 5000

# In cluster mode only one database
databases 1

# ============================================================================
# LOGS & SYSTEM
# ============================================================================

# Must be set to 'no' for Docker containers to keep the process running in foreground
daemonize no

# Log verbosity level (notice is recommended for stable production runs)
loglevel notice

# Keep empty so logs route directly to stdout for Docker logging drivers to harvest
logfile ""

# certs
tls-cert-file /usr/local/etc/redis/redis.crt
tls-key-file /usr/local/etc/redis/redis.key
tls-ca-cert-file /usr/local/etc/redis/ca.crt

# Require clients (Airflow/Celery) to provide a valid certificate
tls-auth-clients no

# Enable SSL for cluster node-to-node communication (Mandatory!)
tls-cluster yes
tls-replication yes

# cluster-announce-port 6379
# cluster-announce-bus-port 16379
