# ==============================================================================
# POSTGRESQL TUNING CONFIGURATION FOR AIRFLOW METADATA (OLTP WORKLOAD)
# ==============================================================================

# ------------------------------------------------------------------------------
# CONNECTIONS AND MEMORY PREFERENCES
# ------------------------------------------------------------------------------

# Maximum number of concurrent client connections.
# Airflow components (Scheduler, Webserver, Workers) require an expanded pool.
max_connections = 100

# Memory dedicated to shared memory buffers for caching data blocks.
# Recommended setting is ~25% of total system RAM for improved read/write performance.
shared_buffers = 128MB

# Estimated amount of memory available for disk caching by the OS and PostgreSQL.
# Helps the optimizer determine if execution plans will fit into RAM (~75% of total RAM).
effective_cache_size = 384MB

# Maximum memory used for database maintenance operations (such as VACUUM, CREATE INDEX).
# High values speed up automated table cleaning routines required by active Airflow setups.
maintenance_work_mem = 32MB


# ------------------------------------------------------------------------------
# WRITE-AHEAD LOG (WAL) AND CHECKPOINTS OPTIMIZATION
# ------------------------------------------------------------------------------

# Specifies the target percentage of checkpoint time over which to spread the write operations.
# Value 0.9 balances and flattens out disk I/O spikes by spreading writes smoothly.
checkpoint_completion_target = 0.9

# Maximum time between automatic WAL checkpoints.
# Increasing this limit minimizes overall disk write volume and extends drive lifespan.
checkpoint_timeout = 15min

# Memory used to buffer WAL data that is not yet written to stable disk storage.
# Automatically sized to fit large transactional sequences generated by the Scheduler.
wal_buffers = 16MB


# ------------------------------------------------------------------------------
# QUERY PLANNER AND STATISTICS COSTS
# ------------------------------------------------------------------------------

# Sets the default statistics target for database fields.
# Higher values increase planner accuracy for complex queries at the expense of ANALYZE time.
default_statistics_target = 100

# Planner's estimate of the cost of a non-sequentially fetched disk page.
# Value 1.1 is highly optimized for modern fast storage media like SSDs/NVMe drives.
random_page_cost = 1.1


# ------------------------------------------------------------------------------
# NETWORK SECURITY AND TRANSPORT ENCRYPTION (TLS/SSL)
# ------------------------------------------------------------------------------

# Enables secure connection capabilities (Transport Layer Security).
ssl = on

# Path to the Certificate Authority (CA) root file to validate client identities.
ssl_ca_file = '/usr/local/etc/postgres/ca.crt'

# Path to the public server-side certificate file presented to connecting clients.
ssl_cert_file = '/usr/local/etc/postgres/postgres.crt'

# Path to the private server-side secret key file (requires strict 600 system permissions).
ssl_key_file = '/usr/local/etc/postgres/postgres.key'
